services:
  web:
    build: .
    env_file: .env
    environment:
      - PRIXE_WARMUP=1
    ports:
      - "8088:8000"
    restart: unless-stopped
    # Cap container logs so json-file logs can't fill the host disk —
    # the prior config kept everything forever, which is the prime suspect
    # for the host becoming unreachable after a few days of uptime.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
