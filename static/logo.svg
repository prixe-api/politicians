<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="The Legend of Stocks">
  <title>The Legend of Stocks</title>

  <!-- Outer navy disc + gold rings -->
  <circle cx="128" cy="128" r="126" fill="#1a2a4a"/>
  <circle cx="128" cy="128" r="126" fill="none" stroke="#0a1222" stroke-width="2"/>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#e8c547" stroke-width="1.5"/>
  <circle cx="128" cy="128" r="102" fill="none" stroke="#e8c547" stroke-width="1"/>

  <!-- Text paths: concentric with the main seal, radii chosen so letter
       ascenders and descenders stay safely inside the gold ring band
       (r=102..r=122). Top arc pulled in to keep the larger title from
       clipping the outer ring; bottom arc pushed out to keep its ascenders
       clear of the inner ring. -->
  <defs>
    <path id="pstaTopArc" d="M 20,128 A 108,108 0 0 1 236,128" fill="none"/>
    <path id="pstaBotArc" d="M 14,128 A 114,114 0 0 0 242,128" fill="none"/>
  </defs>

  <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="12" fill="#e8c547" letter-spacing="2">
    <textPath href="#pstaTopArc" startOffset="50%" text-anchor="middle">THE LEGEND OF STOCKS</textPath>
  </text>
  <text font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="9" fill="#e8c547" letter-spacing="1">
    <textPath href="#pstaBotArc" startOffset="50%" text-anchor="middle">U.S. HOUSE &amp; SENATE FILINGS</textPath>
  </text>

  <!-- Side gold stars as SVG polygons (font-independent so server-side SVG→PNG renderers draw them reliably) -->
  <g fill="#e8c547" stroke="#0d0d0d" stroke-width="0.5">
    <polygon transform="translate(16,128)" points="0,-6 1.41,-1.94 5.71,-1.85 2.28,0.74 3.53,4.85 0,2.4 -3.53,4.85 -2.28,0.74 -5.71,-1.85 -1.41,-1.94"/>
    <polygon transform="translate(240,128)" points="0,-6 1.41,-1.94 5.71,-1.85 2.28,0.74 3.53,4.85 0,2.4 -3.53,4.85 -2.28,0.74 -5.71,-1.85 -1.41,-1.94"/>
  </g>
  <!-- Two small decorative stars flanking the bottom text, centered at r=112 (midway between the two gold rings) and placed at the text endpoint angles so they sit right next to the phrase -->
  <g fill="#e8c547" stroke="#0d0d0d" stroke-width="0.4">
    <polygon transform="translate(46,204)" points="0,-4 0.94,-1.29 3.81,-1.24 1.52,0.49 2.35,3.23 0,1.6 -2.35,3.23 -1.52,0.49 -3.81,-1.24 -0.94,-1.29"/>
    <polygon transform="translate(210,204)" points="0,-4 0.94,-1.29 3.81,-1.24 1.52,0.49 2.35,3.23 0,1.6 -2.35,3.23 -1.52,0.49 -3.81,-1.24 -0.94,-1.29"/>
  </g>

  <!-- Eagle (centered on seal, slightly enlarged) -->
  <g transform="translate(128,108) scale(1.2)">
    <!-- Tail feathers at bottom of body -->
    <g fill="#d8c8a8" stroke="#0d0d0d" stroke-width="0.6">
      <path d="M -14,28 L -18,46 L -6,42 L -8,28 Z"/>
      <path d="M -4,30 L -4,48 L 4,48 L 4,30 Z"/>
      <path d="M 14,28 L 18,46 L 6,42 L 8,28 Z"/>
    </g>

    <!-- Wings spread -->
    <g fill="#e5d4a4" stroke="#0d0d0d" stroke-width="0.8">
      <!-- Left wing -->
      <path d="M -6,-14 Q -28,-30 -56,-22 Q -58,-10 -48,-4 Q -34,0 -20,0 L -8,0 Z"/>
      <!-- Right wing (mirrored) -->
      <path d="M 6,-14 Q 28,-30 56,-22 Q 58,-10 48,-4 Q 34,0 20,0 L 8,0 Z"/>
    </g>
    <!-- Feather detail lines -->
    <g stroke="#0d0d0d" stroke-width="0.5" fill="none">
      <path d="M -20,-24 L -8,-10"/>
      <path d="M -34,-22 L -14,-6"/>
      <path d="M -48,-16 L -22,-2"/>
      <path d="M 20,-24 L 8,-10"/>
      <path d="M 34,-22 L 14,-6"/>
      <path d="M 48,-16 L 22,-2"/>
    </g>

    <!-- Body silhouette (behind shield) -->
    <ellipse cx="0" cy="10" rx="14" ry="22" fill="#d8c8a8" stroke="#0d0d0d" stroke-width="0.8"/>

    <!-- Shield on chest -->
    <g stroke="#0d0d0d" stroke-width="0.6">
      <rect x="-11" y="-6" width="22" height="34" fill="#f5efd6"/>
      <rect x="-11" y="-6" width="22" height="10" fill="#1a3a7c"/>
      <circle cx="-7" cy="-1" r="0.9" fill="#f5efd6" stroke="none"/>
      <circle cx="-2.5" cy="-1" r="0.9" fill="#f5efd6" stroke="none"/>
      <circle cx="2.5" cy="-1" r="0.9" fill="#f5efd6" stroke="none"/>
      <circle cx="7" cy="-1" r="0.9" fill="#f5efd6" stroke="none"/>
      <rect x="-11" y="4" width="22" height="3" fill="#c83a3a" stroke="none"/>
      <rect x="-11" y="10" width="22" height="3" fill="#c83a3a" stroke="none"/>
      <rect x="-11" y="16" width="22" height="3" fill="#c83a3a" stroke="none"/>
      <rect x="-11" y="22" width="22" height="3" fill="#c83a3a" stroke="none"/>
    </g>

    <!-- Head (facing left, eagle convention) -->
    <circle cx="0" cy="-22" r="10" fill="#f5efd6" stroke="#0d0d0d" stroke-width="0.8"/>
    <!-- Eye -->
    <circle cx="-3" cy="-24" r="1.3" fill="#0d0d0d"/>
    <circle cx="-3.5" cy="-24.5" r="0.4" fill="#f5efd6"/>
    <!-- Beak (pointing left) -->
    <path d="M -9,-20 L -16,-18 L -10,-14 Z" fill="#e8c547" stroke="#0d0d0d" stroke-width="0.5"/>
    <!-- Head crest tuft -->
    <path d="M 4,-30 L 6,-26 L 2,-28 Z" fill="#d8c8a8" stroke="#0d0d0d" stroke-width="0.4"/>

    <!-- Legs -->
    <line x1="-8" y1="30" x2="-14" y2="46" stroke="#e8c547" stroke-width="2" stroke-linecap="square"/>
    <line x1="8" y1="30" x2="14" y2="46" stroke="#e8c547" stroke-width="2" stroke-linecap="square"/>
    <!-- Claws -->
    <g fill="#e8c547" stroke="#0d0d0d" stroke-width="0.4">
      <path d="M -18,46 L -12,44 L -12,48 Z"/>
      <path d="M 18,46 L 12,44 L 12,48 Z"/>
    </g>

    <!-- Money bags in claws -->
    <g>
      <!-- Left bag -->
      <g transform="translate(-22, 50)">
        <rect x="-3.5" y="-6" width="7" height="3" fill="#6d4221" stroke="#0d0d0d" stroke-width="0.5"/>
        <path d="M -11,-3 Q -14,10 -10,18 Q 0,22 10,18 Q 14,10 11,-3 Z" fill="#b88747" stroke="#0d0d0d" stroke-width="0.9"/>
        <path d="M -11,-3 L 11,-3" stroke="#6d4221" stroke-width="1"/>
        <path d="M -8,4 Q 0,6 8,4" stroke="#6d4221" stroke-width="0.5" fill="none"/>
        <text x="0" y="13" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#f5d042" stroke="#0d0d0d" stroke-width="1.4" paint-order="stroke">$</text>
      </g>
      <!-- Right bag -->
      <g transform="translate(22, 50)">
        <rect x="-3.5" y="-6" width="7" height="3" fill="#6d4221" stroke="#0d0d0d" stroke-width="0.5"/>
        <path d="M -11,-3 Q -14,10 -10,18 Q 0,22 10,18 Q 14,10 11,-3 Z" fill="#b88747" stroke="#0d0d0d" stroke-width="0.9"/>
        <path d="M -11,-3 L 11,-3" stroke="#6d4221" stroke-width="1"/>
        <path d="M -8,4 Q 0,6 8,4" stroke="#6d4221" stroke-width="0.5" fill="none"/>
        <text x="0" y="13" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#f5d042" stroke="#0d0d0d" stroke-width="1.4" paint-order="stroke">$</text>
      </g>
    </g>
  </g>
</svg>
