<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Executive Wing &mdash; The Legend of Stocks</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="crt">
    <header class="banner">
      <a href="/" class="logo-link" aria-label="The Legend of Stocks &mdash; home">
        <img src="/logo.svg" alt="" class="logo" width="128" height="128">
      </a>
      <h1 class="title">&#9733; THE EXECUTIVE WING &#9733;</h1>
      <div class="banner-hint">WHITE HOUSE OGE 278e ANNUAL DISCLOSURES</div>
      <nav class="exec-nav">
        <a class="exec-link" href="/">&#9664; HOUSE &amp; SENATE</a>
      </nav>
    </header>

    <main class="exec-stage">
      <section class="exec-field-wrap">
        <div class="exec-toolbar">
          <input id="exec-search" class="exec-search" type="text" placeholder="SEARCH FILER..." aria-label="Search">
          <div class="exec-pager">
            <button id="exec-prev" class="btn">&#9664; PREV</button>
            <span id="exec-page" class="exec-page">&mdash;</span>
            <button id="exec-next" class="btn">NEXT &#9654;</button>
          </div>
        </div>
        <div class="scene-wrap">
          <canvas id="field" class="scene exec-field" aria-hidden="true"></canvas>
          <div class="scene-plaque">FILERS&nbsp;<span id="exec-range">&mdash;</span></div>
        </div>
        <div class="exec-hint">&#9632; CLICK A FIGURE TO VIEW THEIR DISCLOSURE &#9632;</div>
      </section>

      <aside class="exec-roster">
        <div class="exec-roster-title">TOP HOLDINGS</div>
        <ol id="exec-list" class="exec-list"></ol>
      </aside>
    </main>

    <footer class="footer">
      <span class="hint">&#9632; CHARACTERS WANDER THE LAWN; THEIR HOLDINGS FLOAT ABOVE &#9632;</span>
      <a class="gh-link" href="https://github.com/prixe-api/politicians" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub">
        <svg class="gh-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M12 0.5C5.373 0.5 0 5.873 0 12.5c0 5.302 3.438 9.8 8.205 11.387.6.111.82-.26.82-.577 0-.285-.01-1.04-.016-2.04-3.338.726-4.043-1.61-4.043-1.61-.546-1.386-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.839 1.237 1.839 1.237 1.07 1.833 2.809 1.303 3.495.996.108-.775.419-1.304.762-1.604-2.665-.303-5.467-1.333-5.467-5.93 0-1.31.468-2.38 1.236-3.22-.124-.303-.536-1.523.117-3.176 0 0 1.008-.323 3.3 1.23.957-.266 1.984-.399 3.003-.404 1.02.005 2.046.138 3.003.404 2.29-1.553 3.297-1.23 3.297-1.23.655 1.653.243 2.873.12 3.176.77.84 1.234 1.91 1.234 3.22 0 4.61-2.807 5.624-5.48 5.92.43.37.815 1.103.815 2.222 0 1.604-.015 2.896-.015 3.29 0 .32.216.694.825.576C20.565 22.296 24 17.8 24 12.5 24 5.873 18.627 0.5 12 0.5z"/>
        </svg>
        <span>GITHUB</span>
      </a>
    </footer>
  </div>

  <div id="exec-modal" class="modal">
    <div class="modal-frame">
      <button id="exec-modal-close" class="modal-close" aria-label="Close">&#10005;</button>
      <div class="modal-body" id="exec-modal-body">
        <div class="loading">LOADING...</div>
      </div>
    </div>
  </div>

  <script src="executive.js"></script>
</body>
</html>
